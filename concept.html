<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kbd s|cut game - concept</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-page="concept">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-keyboard me-1 p-2 border rounded-circle"></i>
        kbd s|cut game
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="concept.html">concept</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="index.html">full game</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="pages/drop.html">drop game</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container min-vh-100 py-4">
    <section class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card shadow-sm border-0 concept-hero">
          <div class="card-body p-4 p-md-5">
            <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
              <span class="badge text-bg-dark">Concept build</span>
              <span class="badge text-bg-light text-dark">Prototype</span>
            </div>
            <h1 class="display-5 fw-bold mb-3">Welcome to my web game</h1>
            <p class="lead mb-0">This is the first build: a simple prototype kept aside while the full shortcut-matching game lives on the home page.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="row mt-4 g-4">
      <div class="col-lg-6">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <label class="form-label" for="playerName">Enter your name</label>
            <input id="playerName" class="form-control" placeholder="Guest">
            <p id="greetPlayer" class="mt-3 mb-0"></p>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span class="fw-semibold">Score</span>
              <span id="gameScore" class="badge text-bg-primary fs-6">Score: 0</span>
            </div>
            <div class="d-flex flex-wrap gap-3">
              <button id="choiceBtn" class="btn btn-secondary"><kbd>option + shift + f</kbd></button>
              <button id="answerBtn" class="btn btn-secondary">vsCode: format code</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="border-top py-3 bg-light">
    <div class="container d-flex flex-wrap justify-content-between gap-2 small">
      <span>Concept prototype</span>
      <div class="d-flex gap-3">
        <a href="index.html">Full game</a>
        <a href="https://github.com/barrycumbie/bravo-webgame" target="_blank" rel="noreferrer">Repo</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.min.js" integrity="sha256-mblSWfbYzaq/f+4akyMhE6XELCou4jbkgPv+JQPER2M=" crossorigin="anonymous"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
